<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LispBM WebAssembly REPL</title>
  <link rel="icon" href="https://www.lispbm.com/ico/favicon.ico">
  <meta name="description" content="Try LispBM in your browser — an embeddable Lisp/Scheme for microcontrollers, running live via WebAssembly.">
  <meta name="keywords" content="LispBM, Lisp, Scheme, WebAssembly, WASM, REPL, embedded, microcontroller">
  <meta property="og:title" content="LispBM WebAssembly REPL">
  <meta property="og:description" content="Try LispBM in your browser — an embeddable Lisp/Scheme for microcontrollers, running live via WebAssembly.">
  <meta property="og:url" content="https://www.lispbm.com/repl-wasm/index.html">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://www.lispbm.com/repl-wasm/index.html">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: "Courier New", monospace;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px;
      gap: 8px;
    }
    h1 { font-size: 16px; color: #569cd6; }
    #main {
      display: flex;
      flex: 1;
      gap: 8px;
      min-height: 0;
    }
    /* --- Left panel: tabbed --- */
    #left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }
    #output-tab-bar {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 2px;
      padding: 4px 4px 0;
      background: #181818;
      flex-shrink: 0;
    }
    #output-tab-bar::-webkit-scrollbar { height: 3px; }
    #output-tab-bar::-webkit-scrollbar-thumb { background: #444; }
    .tab-btn {
      background: #2a2a2a;
      color: #777;
      border: 1px solid #383838;
      border-bottom: none;
      padding: 3px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-btn.active { background: #111; color: #d4d4d4; border-color: #555; }
    .tab-btn:hover:not(.active) { background: #333; color: #bbb; }
    .tab-close { color: #555; font-size: 20px; line-height: 1; }
    .tab-close:hover { color: #e06c75; }
    #output-tab-contents {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }
    .tab-pane {
      display: none;
      width: 100%;
      height: 100%;
      overflow: auto;
    }
    .tab-pane.active { display: block; }
    #output-tab-console {
      padding: 10px;
      white-space: pre;
    }
    .plot-pane { padding: 8px; }
    /* uPlot dark theme overrides */
    .uplot .u-title  { color: #d4d4d4 !important; font-family: "Courier New", monospace; font-size: 13px; }
    .uplot .u-legend { color: #888 !important; font-family: "Courier New", monospace; font-size: 12px; }
    .uplot .u-select { background: rgba(86, 156, 214, 0.25); border: 1px solid rgba(86, 156, 214, 0.6); }
    /* --- Right panel: editor --- */
    #editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #editor-tab-bar {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 2px;
      padding: 4px 4px 0;
      background: #181818;
      flex-shrink: 0;
      align-items: center;
    }
    #editor-tab-bar::-webkit-scrollbar { height: 3px; }
    #editor-tab-bar::-webkit-scrollbar-thumb { background: #444; }
    #btn-new-editor-tab {
      background: #222;
      color: #888;
      border: 1px solid #383838;
      padding: 2px 8px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }
    #btn-new-editor-tab:hover { color: #d4d4d4; background: #333; }
    #editor-tab-contents {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      min-height: 0;
      position: relative;
    }
    .editor-pane {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
    }
    .editor-pane.active { display: flex; }
    .CodeMirror {
      flex: 1;
      height: 100%;
      font-family: "Courier New", monospace;
      font-size: 14px;
      border: none;
    }
    .CodeMirror-focused { outline: 1px solid #569cd6; }
    #editor-btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 4px;
    }
    #btn-load:disabled { background: #333; color: #666; cursor: default; }
    #btn-load:hover:not(:disabled) { background: #1177bb; }
    #btn-open, #btn-save, #btn-examples { background: #3a3a3a; color: #d4d4d4; border: 1px solid #555; }
    #btn-open:hover, #btn-save:hover, #btn-examples:hover { background: #4a4a4a; }
    #examples-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #examples-modal.open { display: flex; }
    #examples-box {
      background: #1e1e1e;
      border: 1px solid #444;
      padding: 16px;
      min-width: 340px;
      max-width: 520px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #examples-box h2 { font-size: 14px; color: #569cd6; }
    #examples-list { overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .example-item {
      background: #2a2a2a;
      border: 1px solid #383838;
      padding: 8px 10px;
      cursor: pointer;
    }
    .example-item:hover { background: #333; border-color: #569cd6; }
    .example-item .ex-name { color: #d4d4d4; font-size: 13px; }
    .example-item .ex-desc { color: #888; font-size: 11px; margin-top: 3px; }
    #examples-close { align-self: flex-end; background: #3a3a3a; border: 1px solid #555; color: #d4d4d4; }
    /* --- Input row --- */
    #input-row { display: flex; gap: 8px; align-items: center; }
    #prompt { color: #569cd6; }
    #input {
      flex: 1;
      background: #2d2d2d;
      color: #d4d4d4;
      border: 1px solid #444;
      padding: 4px 8px;
      font-family: inherit;
      font-size: inherit;
      outline: none;
    }
    #input:focus { border-color: #569cd6; }
    button {
      background: #0e639c;
      color: #fff;
      border: none;
      padding: 4px 16px;
      font-family: inherit;
      cursor: pointer;
    }
    button:disabled { background: #333; color: #666; cursor: default; }
    button:hover:not(:disabled) { background: #1177bb; }
    #status { font-size: 12px; color: #888; }
    #busy-led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      display: inline-block;
      transition: background 0.1s;
    }
    #busy-led.on { background: #4ec9b0; box-shadow: 0 0 4px #4ec9b0; }
  </style>
</head>
<body>
  <h1>LispBM WebAssembly REPL &mdash; <a href="https://www.lispbm.com" style="color:#569cd6;font-size:12px;">lispbm.com</a></h1>
  <div id="main">
    <div id="left-panel">
      <div id="output-tab-bar"></div>
      <div id="output-tab-contents"></div>
    </div>
    <div id="editor-panel">
      <div id="editor-tab-bar">
        <button id="btn-new-editor-tab">+</button>
      </div>
      <div id="editor-tab-contents"></div>
      <div id="editor-btn-row">
        <button id="btn-examples">Examples</button>
        <button id="btn-open">Open</button>
        <button id="btn-save">Save</button>
        <button id="btn-load" disabled>Load</button>
      </div>
      <input type="file" id="file-input" accept=".lisp,.lbm" style="display:none">
    </div>
  </div>
  <div id="input-row">
    <span id="prompt">#</span>
    <input id="input" type="text" placeholder="Enter expression..." autocomplete="off" disabled>
    <button id="btn-eval" disabled>Eval</button>
  </div>
  <div id="status" style="display:flex;align-items:center;gap:6px;"><span id="busy-led"></span><span id="status-text">Activity</span><span style="flex:1"></span><label for="steps-select" style="font-size:12px;color:#888;">steps:</label><select id="steps-select" style="background:#2d2d2d;color:#d4d4d4;border:1px solid #555;font-size:12px;"><option value="100">100</option><option value="500">500</option><option value="1000" selected>1000</option><option value="5000">5000</option></select></div>

  <div id="examples-modal">
    <div id="examples-box">
      <h2>Examples</h2>
      <div id="examples-list"></div>
      <button id="examples-close">Close</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/scheme/scheme.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="lispbm.js"></script>
  <script src="repl.js"></script>
</body>
</html>
